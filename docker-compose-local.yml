version: "3.8"

services:
  fineract:
    image: fineract-custom:latest
    container_name: fineract-server
    ports:
      - "8443:8443"
      - "8080:8080"
    # Using host.docker.internal to connect to local PostgreSQL on macOS
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Database configuration (PostgreSQL) - connecting to local PostgreSQL
      FINERACT_HIKARI_DRIVER_SOURCE_CLASS_NAME: org.postgresql.Driver
      FINERACT_HIKARI_JDBC_URL: jdbc:postgresql://host.docker.internal:5432/fineract_tenants?sslmode=disable
      FINERACT_HIKARI_USERNAME: ${POSTGRES_USER:-fineract}
      FINERACT_HIKARI_PASSWORD: ${POSTGRES_PASSWORD:-mysql}

      # Tenant database configuration - connecting to local PostgreSQL (matches application.properties)
      FINERACT_DEFAULT_TENANTDB_HOSTNAME: host.docker.internal
      FINERACT_DEFAULT_TENANTDB_PORT: 5432
      FINERACT_DEFAULT_TENANTDB_UID: ${POSTGRES_USER:-fineract}
      FINERACT_DEFAULT_TENANTDB_PWD: ${POSTGRES_PASSWORD:-mysql}
      FINERACT_DEFAULT_TENANTDB_CONN_PARAMS: sslmode=disable
      FINERACT_DEFAULT_TENANTDB_TIMEZONE: UTC
      FINERACT_DEFAULT_TENANTDB_IDENTIFIER: default
      FINERACT_DEFAULT_TENANTDB_NAME: fineract_default
      FINERACT_DEFAULT_TENANTDB_DESCRIPTION: Default tenant

      # Server configuration
      FINERACT_SERVER_SSL_ENABLED: true
      FINERACT_SECURITY_BASICAUTH_ENABLED: true
      FINERACT_SECURITY_OAUTH_ENABLED: false
      FINERACT_SECURITY_2FA_ENABLED: false
      FINERACT_MODE_READ_ENABLED: true
      FINERACT_MODE_WRITE_ENABLED: true
      FINERACT_MODE_BATCH_ENABLED: true

      # Timezone
      TZ: UTC

      # Remote debugging (optional - uncomment to enable)
      # JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"

    # Uncomment for remote debugging
    # ports:
    #   - "5005:5005"

    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8443/fineract-provider/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

    volumes:
      - ./build/fineract/logs:/var/logs/fineract:rw
