# Custom test properties
# Enable initialization with our custom ordered configuration
fineract-test.initialization.enabled=true
INITIALIZATION_ENABLED=true

# Disable event verification
fineract-test.event.verification-enabled=false
EVENT_VERIFICATION_ENABLED=false

# Disable TestRail integration
fineract-test.testrail.enabled=false
TESTRAIL_ENABLED=false

# Messaging configuration (disabled)
fineract-test.messaging.jms.broker-url=
fineract-test.messaging.jms.broker-username=
fineract-test.messaging.jms.broker-password=
fineract-test.messaging.jms.topic-name=
