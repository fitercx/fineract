# Odoo Integration Configuration Example
# Add these properties to your application.yml or application.properties

odoo:
  # Odoo server connection settings
  url: "http://localhost:8069" # Replace with your Odoo server URL
  database: "fineract_odoo" # Replace with your Odoo database name
  username: "admin" # Replace with your Odoo username
  password: "admin" # Replace with your Odoo password

  # Connection timeout settings (in milliseconds)
  timeout: 30000 # 30 seconds

  # Retry configuration
  max-retries: 3 # Number of retry attempts
  retry-delay: 1000 # Delay between retries in milliseconds

  # Enable/disable integration
  enabled: true # Set to false to disable Odoo integration

# Example Spring Boot profile configuration
---
spring:
  profiles: development

odoo:
  url: "http://localhost:8069"
  database: "fineract_dev"
  username: "admin"
  password: "admin"
  enabled: true

---
spring:
  profiles: production

odoo:
  url: "${ODOO_URL:http://odoo.company.com}"
  database: "${ODOO_DATABASE:fineract_prod}"
  username: "${ODOO_USERNAME:fineract_user}"
  password: "${ODOO_PASSWORD:secure_password}"
  timeout: 60000
  max-retries: 5
  retry-delay: 2000
  enabled: true

# Logging configuration for Odoo integration
logging:
  level:
    com.crediblex.fineract.integration.odoo: DEBUG
    root: INFO
